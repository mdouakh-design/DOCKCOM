name: CI - Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build images with docker-compose
        run: docker-compose build

      - name: Push images to Docker Hub
        run: |
          docker push marindo/flask-api:latest
          docker push marindo/frontend-app:latest

      - name: Verify images are available on Docker Hub
        run: |
          docker pull marindo/flask-api:latest
          docker pull marindo/frontend-app:latest
          echo "Images vérifiées sur Docker Hub"