name: CI - Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: docker-compose build

      - name: Tag images
        run: |
          docker tag monprojet_backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker tag monprojet_frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          # Ajoutez d'autres services si nécessaire

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Verify images on Docker Hub
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          echo "Images vérifiées sur Docker Hub"